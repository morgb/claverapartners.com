<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Clavera Partners</title>
  <meta name="description" content="Get in touch with Clavera Partners." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="nav-logo-clavera">CLAVERA</span>
        <span class="nav-logo-partners">PARTNERS</span>
      </a>
      <ul class="nav-links">
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="contact.html" class="nav-cta">Get in Touch</a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE HERO -->
  <section class="page-hero">
    <div class="page-hero-inner">
      <p class="hero-eyebrow">Get in touch</p>
      <h1 class="page-headline">Let's talk.</h1>
    </div>
  </section>

  <!-- CONTACT FORM -->
  <section class="content-section">
    <div class="content-inner">
      <p class="body-large" style="margin-bottom: 3rem;">If any of this sounds familiar, we'd love to hear from you. Fill out the form below and we'll be in touch shortly.</p>

      <form class="contact-form" action="https://formspree.io/f/mlgkodvr" method="POST">

        <div class="form-row">
          <div class="form-group">
            <label for="name">Your name</label>
            <input type="text" id="name" name="name" required placeholder="Jane Smith" />
          </div>
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" required placeholder="jane@company.com" />
          </div>
        </div>

        <div class="form-group">
          <label for="company">Company</label>
          <input type="text" id="company" name="company" placeholder="Company name" />
        </div>

        <div class="form-group">
          <label for="message">What's on your mind?</label>
          <br />
          <textarea id="message" name="message" rows="6" required placeholder="Tell us a little about your company and what you're working through..."></textarea>
        </div>

        <button type="submit" class="btn-primary">Send Message</button>

      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo">CLAVERA PARTNERS</span>
      <span class="footer-copy">&copy; 2026 Clavera Partners. All rights reserved.</span>
    </div>
  </footer>

</body>
</html>
